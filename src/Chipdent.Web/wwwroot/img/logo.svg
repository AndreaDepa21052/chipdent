<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Chipdent">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fbf0d6"/>
      <stop offset="100%" stop-color="#ecd9b1"/>
    </radialGradient>
    <linearGradient id="fur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5a2b"/>
      <stop offset="55%" stop-color="#a26a33"/>
      <stop offset="100%" stop-color="#7d4a23"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3517"/>
      <stop offset="100%" stop-color="#7a4a22"/>
    </linearGradient>
    <linearGradient id="cheek" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbecc7"/>
      <stop offset="100%" stop-color="#e8c896"/>
    </linearGradient>
    <linearGradient id="cheekR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbecc7"/>
      <stop offset="100%" stop-color="#e8c896"/>
    </linearGradient>
    <radialGradient id="earL" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d9a067"/>
      <stop offset="100%" stop-color="#a26a33"/>
    </radialGradient>
    <radialGradient id="earR" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d9a067"/>
      <stop offset="100%" stop-color="#a26a33"/>
    </radialGradient>
    <radialGradient id="nose" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#e8a5a0"/>
      <stop offset="100%" stop-color="#b66a64"/>
    </radialGradient>
    <clipPath id="badge">
      <circle cx="128" cy="128" r="112"/>
    </clipPath>
  </defs>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="120" fill="#f5e8d0"/>
  <circle cx="128" cy="128" r="118" fill="none" stroke="#3d2316" stroke-width="8"/>
  <circle cx="128" cy="128" r="112" fill="url(#bg)"/>

  <g clip-path="url(#badge)">
    <!-- Ears -->
    <g>
      <ellipse cx="82" cy="82" rx="18" ry="22" fill="url(#earL)" stroke="#5a3517" stroke-width="2.5" transform="rotate(-18 82 82)"/>
      <ellipse cx="82" cy="84" rx="9" ry="13" fill="#e8b88a" transform="rotate(-18 82 84)"/>
      <ellipse cx="174" cy="82" rx="18" ry="22" fill="url(#earR)" stroke="#5a3517" stroke-width="2.5" transform="rotate(18 174 82)"/>
      <ellipse cx="174" cy="84" rx="9" ry="13" fill="#e8b88a" transform="rotate(18 174 84)"/>
    </g>

    <!-- Head (top fur) -->
    <path d="M70 118
             Q72 76 100 64
             Q128 52 156 64
             Q184 76 186 118
             Q186 138 178 152
             L78 152
             Q70 138 70 118 Z"
          fill="url(#fur)" stroke="#5a3517" stroke-width="2.5"/>

    <!-- Forehead stripe (darker) -->
    <path d="M110 70
             Q128 56 146 70
             Q150 96 144 130
             Q128 142 112 130
             Q106 96 110 70 Z"
          fill="url(#stripe)"/>

    <!-- Fur tufts on stripe -->
    <path d="M118 64 L122 56 L126 64 L130 54 L134 64 L138 56 L142 64"
          fill="none" stroke="#3d2316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Light fur highlights on sides -->
    <path d="M82 110 Q90 100 96 112" fill="none" stroke="#d9a067" stroke-width="2" stroke-linecap="round"/>
    <path d="M174 110 Q166 100 160 112" fill="none" stroke="#d9a067" stroke-width="2" stroke-linecap="round"/>

    <!-- Eye sockets (lighter cream around eyes) -->
    <ellipse cx="100" cy="118" rx="16" ry="14" fill="#fbecc7" opacity="0.85"/>
    <ellipse cx="156" cy="118" rx="16" ry="14" fill="#fbecc7" opacity="0.85"/>

    <!-- Eyes -->
    <ellipse cx="100" cy="120" rx="11" ry="12" fill="#1c0e05"/>
    <ellipse cx="156" cy="120" rx="11" ry="12" fill="#1c0e05"/>
    <!-- Eye highlights -->
    <circle cx="96" cy="115" r="3.2" fill="#ffffff"/>
    <circle cx="104" cy="124" r="1.6" fill="#ffffff"/>
    <circle cx="152" cy="115" r="3.2" fill="#ffffff"/>
    <circle cx="160" cy="124" r="1.6" fill="#ffffff"/>

    <!-- Cheeks (chipmunk pouches) -->
    <path d="M58 156
             Q44 168 56 188
             Q72 204 100 200
             Q116 196 122 184
             Q124 168 116 158
             Q92 148 58 156 Z"
          fill="url(#cheek)" stroke="#5a3517" stroke-width="2.5"/>
    <path d="M198 156
             Q212 168 200 188
             Q184 204 156 200
             Q140 196 134 184
             Q132 168 140 158
             Q164 148 198 156 Z"
          fill="url(#cheekR)" stroke="#5a3517" stroke-width="2.5"/>

    <!-- Cheek fur strokes -->
    <g stroke="#c89060" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.7">
      <path d="M64 170 L78 174"/>
      <path d="M62 180 L80 182"/>
      <path d="M66 190 L84 188"/>
      <path d="M76 196 L92 192"/>
      <path d="M192 170 L178 174"/>
      <path d="M194 180 L176 182"/>
      <path d="M190 190 L172 188"/>
      <path d="M180 196 L164 192"/>
    </g>

    <!-- Nose -->
    <path d="M120 152 Q128 146 136 152 Q138 162 128 166 Q118 162 120 152 Z"
          fill="url(#nose)" stroke="#7a3d36" stroke-width="1.5"/>
    <ellipse cx="125" cy="154" rx="2" ry="1.3" fill="#f5cdc6" opacity="0.8"/>

    <!-- Muzzle highlight -->
    <path d="M118 170 Q128 174 138 170" fill="none" stroke="#c89060" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>

    <!-- Mouth -->
    <path d="M128 168 Q124 174 120 174" fill="none" stroke="#3d2316" stroke-width="2" stroke-linecap="round"/>
    <path d="M128 168 Q132 174 136 174" fill="none" stroke="#3d2316" stroke-width="2" stroke-linecap="round"/>
    <path d="M122 176 Q128 182 134 176 Q130 180 128 180 Q126 180 122 176 Z" fill="#d9857a"/>

    <!-- Front teeth -->
    <rect x="124.2" y="174.5" width="3.4" height="5" rx="0.8" fill="#fbf6e8" stroke="#b89a6a" stroke-width="0.6"/>
    <rect x="128.4" y="174.5" width="3.4" height="5" rx="0.8" fill="#fbf6e8" stroke="#b89a6a" stroke-width="0.6"/>

    <!-- Whisker dots -->
    <g fill="#5a3517" opacity="0.55">
      <circle cx="116" cy="166" r="0.9"/>
      <circle cx="113" cy="170" r="0.9"/>
      <circle cx="111" cy="174" r="0.9"/>
      <circle cx="140" cy="166" r="0.9"/>
      <circle cx="143" cy="170" r="0.9"/>
      <circle cx="145" cy="174" r="0.9"/>
    </g>

    <!-- Chin fur -->
    <path d="M104 198
             Q116 214 128 216
             Q140 214 152 198
             Q140 208 128 208
             Q116 208 104 198 Z"
          fill="#e8c896" opacity="0.9"/>
  </g>
</svg>
